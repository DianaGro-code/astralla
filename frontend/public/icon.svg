<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0b0b1a"/>
  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="148" stroke="#D4AF37" stroke-width="2" fill="none" opacity="0.25"/>
  <!-- Main orbit ring -->
  <circle cx="256" cy="256" r="128" stroke="#D4AF37" stroke-width="12" fill="none"/>
  <!-- Center planet dot -->
  <circle cx="256" cy="256" r="32" fill="#D4AF37"/>
  <!-- Cardinal tick marks -->
  <line x1="256" y1="92"  x2="256" y2="138" stroke="#D4AF37" stroke-width="12" stroke-linecap="round"/>
  <line x1="256" y1="374" x2="256" y2="420" stroke="#D4AF37" stroke-width="12" stroke-linecap="round"/>
  <line x1="92"  y1="256" x2="138" y2="256" stroke="#D4AF37" stroke-width="12" stroke-linecap="round"/>
  <line x1="374" y1="256" x2="420" y2="256" stroke="#D4AF37" stroke-width="12" stroke-linecap="round"/>
</svg>
